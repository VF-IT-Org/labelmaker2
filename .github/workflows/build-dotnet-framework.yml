name: Build .NET Framework App

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install .NET Framework 4.6.1 developer pack
        run: choco install netfx-4.6.1-devpack --no-progress -y

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore packages
        run: nuget restore .\WindowsFormsApp1.sln

      - name: Build solution
        run: msbuild .\WindowsFormsApp1.sln /p:Configuration=Release /p:SignManifests=false /p:GenerateClickOnceManifests=false

      - name: Package build output
        run: Compress-Archive -Path WindowsFormsApp1\bin\Release\* -DestinationPath labelmaker2.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: labelmaker2
          path: labelmaker2.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: labelmaker2.zip
